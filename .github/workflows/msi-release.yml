name: Build MSI Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (optional, defaults to pom.xml version)'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Resolve version
        id: ver
        run: |
          POM=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          INPUT="${{ github.event.inputs.version }}"
          echo "VERSION=${INPUT:-$POM}" >> $GITHUB_OUTPUT

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build JAR
        run: mvn clean package -DskipTests
      - name: Install WiX Toolset (required by jpackage for MSI)
        run: choco install wixtoolset --version=3.14.1 -y
        shell: powershell
      - name: Convert icon to .ico
        run: magick src/resources/Icon.png -resize 256x256 Icon.ico
        shell: bash
      - name: Prepare jpackage input
        run: |
          mkdir -p jpackage-input
          cp target/booklist-*-jar-with-dependencies.jar jpackage-input/
        shell: bash
      - name: Create MSI installer
        run: |
          jpackage \
            --type msi \
            --name Booklist \
            --app-version "$VERSION" \
            --input jpackage-input \
            --main-jar booklist-${VERSION}-jar-with-dependencies.jar \
            --main-class gui.Mainframe \
            --icon Icon.ico \
            --win-dir-chooser \
            --win-shortcut \
            --win-menu \
            --dest dist
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi

  release:
    needs: [prepare, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Upload MSI to existing Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.prepare.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            dist/*
